<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Painel de Ferramentas</title>
</head>

<body>

    <header>
        <h1>Painel de Ferramentas</h1>
    </header>

    <main>

        <nav class="aba-lateral">
            <button id="puxarmoeda">Conversor de Moedas</button>
            <button id="puxarimc">Calcular IMC</button>
            <button id="puxartemperatura">Conversor de Temperatura</button>
            <button id="puxarvelocidade">Conversor de Velocidade</button>
            <button id="puxarmassa">Conversor de Massa</button>
            <button id="regratres">Regra de Três</button>
        </nav>

        <section id="ferramentas">

            <div class="painelmoeda hidden">
                <p>Converta suas moedas!</p>
                <input type="text" placeholder="Digite a quantia" class="quantiaDigitada">
                <p id="quantiaConvertida"></p>
                <button class="botao-moedarealpradolar">Converter</button>
                <button class="botao-moedadolarprareal">Tocar para dólares</button>
            </div>

            <div class="painelimc hidden">
                <p>Calcule seu IMC!</p>
                <div class="inputsimc">
                <input class="pesoDigitado" type="text" placeholder="Digite o peso">
                <input class="alturaDigitada" type="text" placeholder="Digite a altura com . ex: 1.65">
                </div>
                <button class="botao-imc">Calcular</button>
                <p id="resultadoIMC"></p>
            </div>

            <div class="paineltemperatura hidden">

            </div>

            <div class="painelvelocidade hidden">

            </div>

            <div class="painelmassa hidden">

            </div>

            <div class="painelregra hidden">
                <p>Calcule seu número X!</p>
                </div>
                
            


        </section>

    </main>

    <footer>
        <p>Desenvolvido por Alika</p>
    </footer>

</body>

</html>

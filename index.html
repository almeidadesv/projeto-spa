<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Painel de Ferramentas</title>
</head>

<body>

    <header>
        <h1>Painel de Ferramentas</h1>
    </header>

    <main>

        <nav class="aba-lateral">
            <button id="puxarmoeda">Conversor de Moedas</button>
            <button id="puxarimc">Calcular IMC</button>
            <button id="puxartemperatura">Conversor de Temperatura</button>
            <button id="puxarvelocidade">Conversor de Velocidade</button>
            <button id="puxarmassa">Conversor de Massa</button>
            <button id="regratres">Regra de Três</button>
        </nav>

        <section id="ferramentas">

            <div class="painelmoeda hidden">
                <p>Converta suas moedas!</p>
                <input type="text" placeholder="Digite o valor" class="quantiaDigitada">
                <p id="quantiaConvertida"></p>
                <button class="botao-moeda">Converter</button>
            </div>

            <div class="painelimc hidden">
                <p>Calcule seu IMC!</p>
                <div class="inputsimc">
                <input class="pesoDigitado" type="text" placeholder="Digite o peso">
                <input class="alturaDigitada" type="text" placeholder="Digite a altura com . ex: 1.65">
                </div>
                <button class="botao-imc">Calcular</button>
                <p id="resultadoIMC"></p>
            </div>

            <div class="paineltemperatura hidden">
                <p>Converta sua temperatura!</p>
                <input type="text" placeholder="Digite a temperatura" class="temperaturaDigitada">
                <button class="botao-temperatura">Converter</button>
                <p id="resultadoTemperatura"></p>
            </div>

            <div class="painelvelocidade hidden">
                <p>Converta sua velocidade!</p>
                <input type="text" placeholder="Digite a quantia" class="velocidadeDigitada">
                <p id="resultadoVelocidade"></p>
                <button class="botao-velocidade">Calcular</button>
            </div>

            <div class="painelmassa hidden">
                <p>Converta sua massa!</p>
                <input type="text" placeholder="Digite o peso" class="pesodoisDigitado">
                <p id="resultadoMassa"></p>
                <button class="botao-massa">Converter</button>
            </div>

            <div class="painelregra hidden">
                <p>Calcule seu número X!</p>
                <div>
                <input type="text" placeholder="Digite o número" class="numeroum">
                <input type="text" placeholder="Digite o número" class="numerodois">
                </div>
                <input type="text" placeholder="Digite o número" class="numerotres">
                <p id="resultadoRegra"></p>
                <button class="botao-regra">Calcular</button>
    
                </div>
                
            


        </section>

    </main>

    <footer>
        <p>Desenvolvido por Alika</p>
    </footer>

</body>

</html>
